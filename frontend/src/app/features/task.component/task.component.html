<div>
    <div class="p-6">
        @if(taskList.length == 0){
        <div class="flex justify-center items-center h-[85vh]">
            <div>
                <p>There is No Tasks Avilable..</p>
                <a routerLink="/newtask" class="text-blue-500 underline">Make a New Task</a>
            </div>
        </div>
        }
        @if(taskList.length != 0){
            @for (task of taskList; track task.id) {
                <div class="border flex rounded p-4 shadow-sm my-3 justify-between pr-20">
                    <div class="">
                        <div class="font-bold text-lg">{{ task.title }}</div>
                        <div class="text-gray-600">{{ task.description }}</div>

                        <div class="mt-2 flex gap-4 text-sm">
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded">
                                {{ task.status }}
                            </span>
                            <span class="text-gray-500">
                                {{task.createdAt}}
                            </span>
                        </div>
                    </div>
                    <div class="flex gap-4 items-center">
                        <button class="px-4 py-2 bg-red-400 text-white rounded hover:bg-red-500 transition cursor-pointer"
                            (click)="delete(task.id)">
                            Delete
                        </button>

                        <button class="px-4 py-2 bg-blue-400 text-white rounded hover:bg-blue-500 transition cursor-pointer"
                            (click)="edit(task.id)">
                            Edit
                        </button>
                    </div>

                </div>
            }
        }

    </div>
</div>
